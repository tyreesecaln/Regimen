<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0C0A09">
<title>The Regimen</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230C0A09'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle' fill='%238C2F2F' font-family='serif'%3E✕%3C/text%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Pirata+One&family=Space+Grotesk:wght@400;500;700&display=swap');
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; }
body { background: #0C0A09; color: #E8E2D6; font-family: 'Space Grotesk', system-ui, sans-serif; padding: 22px 12px 40px; min-height: 100vh; }
.frame { max-width: 430px; margin: 0 auto; border: 2px solid #2A2620; padding: 20px 16px 16px; }
input { background: #12100D; border: 1px solid #3A362F; color: #E8E2D6; padding: 7px 6px; font-size: 13px; font-family: inherit; width: 56px; }
input:focus { outline: 1px solid #8C2F2F; }
input::placeholder { color: #3A362F; }
button { font-family: inherit; cursor: pointer; }
.title { font-family: 'Pirata One', serif; font-size: 44px; line-height: 1; letter-spacing: 1px; text-align: center; }
.date { font-size: 11px; color: #6E675C; text-transform: uppercase; letter-spacing: 3px; margin-top: 6px; text-align: center; }
.statsrow { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #2A2620; border-bottom: 1px solid #2A2620; padding: 12px 2px; margin: 14px 0 10px; }
.streaknum { font-family: 'Pirata One', serif; font-size: 46px; line-height: 1; color: #8C2F2F; }
.statlabel { font-size: 10px; color: #6E675C; text-transform: uppercase; letter-spacing: 2px; margin-top: 3px; }
.statright { text-align: right; }
.lv { font-family: 'Pirata One', serif; font-size: 20px; line-height: 1.1; }
.ptsline { font-size: 11px; color: #6E675C; margin-top: 3px; }
.ptsline b { color: #8C2F2F; font-weight: 700; }
.xptrack { height: 3px; background: #1E1B16; margin: 0 0 12px; }
.xpfill { height: 100%; background: #8C2F2F; transition: width .4s ease; }
.tabs { display: flex; border-bottom: 1px solid #2A2620; margin-bottom: 4px; }
.tab { flex: 1; background: transparent; border: none; padding: 10px 0 8px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #6E675C; border-bottom: 2px solid transparent; font-weight: 500; }
.tab.on { color: #E8E2D6; border-bottom-color: #8C2F2F; }
.section { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: #6E675C; margin: 18px 2px 4px; }
.strip { display: flex; gap: 4px; margin: 12px 0 4px; }
.stripday { flex: 1; text-align: center; }
.stripdot { width: 9px; height: 9px; margin: 0 auto 4px; border: 1px solid #3A362F; transform: rotate(45deg); }
.stripletter { font-size: 10px; color: #6E675C; }
.habit { display: flex; align-items: center; gap: 12px; width: 100%; background: transparent; border: none; border-bottom: 1px solid #1E1B16; padding: 12px 2px; color: #E8E2D6; text-align: left; }
.checkbox { width: 24px; height: 24px; border: 2px solid #3A362F; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; font-weight: 700; line-height: 1; transition: border-color .15s; }
.checkbox.on { border-color: #E8E2D6; }
.hlabel { font-size: 15px; font-weight: 700; letter-spacing: .4px; }
.hlabel.done { text-decoration: line-through; text-decoration-thickness: 2px; color: #6E675C; }
.hsub { font-size: 11px; color: #6E675C; margin-top: 2px; line-height: 1.5; }
.badge { font-size: 11px; padding: 2px 0; letter-spacing: 1px; white-space: nowrap; color: #6E675C; }
.xp { font-size: 11px; color: #8C2F2F; width: 34px; text-align: right; flex-shrink: 0; font-weight: 700; }
.liftrow { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #1E1B16; padding: 10px 2px; }
.smallbtn { background: transparent; border: 1px solid #3A362F; color: #B8B0A2; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 10px; white-space: nowrap; }
.smallbtn:disabled { color: #3A362F; cursor: default; }
.smallbtn.hot { border-color: #8C2F2F; color: #E8E2D6; }
.bigbtn { width: 100%; margin-top: 16px; background: transparent; border: 1px solid #8C2F2F; color: #E8E2D6; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; padding: 14px 0; font-weight: 500; }
.bigbtn:disabled { opacity: .35; cursor: default; }
.card { flex: 1; border: 1px solid #2A2620; padding: 12px 12px 10px; }
.cardtitle { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: #6E675C; }
.counternum { font-family: 'Pirata One', serif; font-size: 32px; margin: 6px 0 8px; }
.wquest { border-bottom: 1px solid #1E1B16; padding: 10px 2px; }
.wbar { height: 3px; background: #1E1B16; margin-top: 7px; }
.wfill { height: 100%; background: #8C2F2F; transition: width .4s; }
.radcount { font-family: 'Pirata One', serif; font-size: 16px; color: #8C2F2F; white-space: nowrap; }
.footer { text-align: center; font-size: 10px; color: #3A362F; letter-spacing: 3px; text-transform: uppercase; margin-top: 20px; }
.fadein { animation: fi .25s ease; }
@keyframes fi { from { opacity: 0; } to { opacity: 1; } }
.floatxp { position: fixed; z-index: 50; pointer-events: none; font-family: 'Pirata One', serif; font-size: 18px; color: #8C2F2F; animation: floatUp 1s ease-out forwards; }
@keyframes floatUp { 0% { opacity: 0; transform: translateY(6px); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(-42px); } }
.banner { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; background: radial-gradient(ellipse at center, rgba(12,10,9,.93) 0%, rgba(12,10,9,0) 72%); animation: bannerFade 2.4s ease forwards; }
.banner .bline { width: 74%; max-width: 320px; height: 1px; background: linear-gradient(90deg, transparent, #8C2F2F, transparent); transform: scaleX(0); animation: lineGrow .5s ease .1s forwards; }
.banner .btext { font-family: 'Pirata One', serif; font-size: 30px; letter-spacing: 4px; color: #E8E2D6; margin: 12px 0; animation: textIn .5s ease forwards; }
.banner .bsub { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #8C2F2F; animation: textIn .5s ease .2s both; margin-bottom: 12px; }
@keyframes lineGrow { to { transform: scaleX(1); } }
@keyframes textIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes bannerFade { 0%, 72% { opacity: 1; } 100% { opacity: 0; } }
@media (prefers-reduced-motion: reduce) { .fadein, .floatxp, .banner { animation-duration: .01s; } }
</style>
</head>
<body>
<div class="frame">
  <div class="title">The Regimen</div>
  <div class="date" id="dateline"></div>
  <div class="statsrow">
    <div><div class="streaknum" id="streak">0</div><div class="statlabel">day streak</div></div>
    <div class="statright"><div class="lv" id="lvline"></div><div class="ptsline" id="ptsline"></div></div>
  </div>
  <div class="xptrack"><div class="xpfill" id="xpfill"></div></div>
  <div class="tabs" id="tabs"></div>
  <div id="view"></div>
  <div class="footer">consistency beats intensity</div>
</div>

<script>
const KEY = 'regimen-v3';
const PTS = { skinAM: 10, skinPM: 10, curls: 5, tret: 15, protein: 10, steps: 15, sleep: 10, gym: 25 };
const PTS_BARBER = 20, PTS_PHOTO = 30, PTS_KIT = 10, DAY_BONUS = 25;
const LVL_XP = 500;

const DAILY = [
  { id: 'skinAM', name: 'Skin AM', sub: 'rinse · Cicaplast SPF50' },
  { id: 'curls', name: 'Curls', sub: 'leave-in on damp hair' },
  { id: 'steps', name: '10k Steps', sub: 'walk the long road' },
  { id: 'protein', name: 'Protein', sub: '150–170g today' },
  { id: 'skinPM', name: 'Skin PM', sub: 'gentle cleanse · moisturize' },
  { id: 'tret', name: 'Treatment', sub: 'Neotone or active · as tolerated', weekly: 3 },
  { id: 'sleep', name: 'Sleep', sub: '7+ hours last night' },
];

const WEEKLY = [
  { id: 'gym', target: 3, bonus: 50, name: 'Three Sessions', sub: 'complete 3 workouts this week' },
  { id: 'tret', target: 3, bonus: 30, name: 'Three Treatments', sub: 'treatment on 3 nights' },
  { id: 'steps', target: 5, bonus: 40, name: 'Five Marches', sub: '10k steps on 5 days' },
  { id: 'skinAM', target: 7, bonus: 40, name: 'Seven Suns', sub: 'SPF every morning, no gaps' },
];

const RADIANT = [
  { id: 'flawless', name: 'A Flawless Seven', sub: 'every daily, seven days straight', pts: 200 },
  { id: 'gauntlet', name: 'The Pilgrimage', sub: '10k steps every day for 7 days', pts: 150 },
  { id: 'ironmonth', name: 'Month of Iron', sub: '13+ sessions in one calendar month', pts: 250 },
  { id: 'cleanseven', name: 'The Ascetic', sub: 'no junk food or takeaway for 7 days', pts: 100 },
  { id: 'record', name: 'New Heights', sub: 'beat any lift record by 5kg+', pts: 50 },
  { id: 'dawn', name: 'Before the Sun', sub: 'train before 8am', pts: 30 },
];

const KIT = [
  { id: 'tretTube', label: 'Neotone exfoliating gel' },
  { id: 'spf', label: 'Cicaplast B5+ SPF50' },
  { id: 'cleanser', label: 'Gentle cleanser' },
  { id: 'moisturizer', label: 'Moisturizer' },
  { id: 'curlCream', label: 'Curl cream / leave-in' },
  { id: 'strips', label: 'Whitening strips (month 5)' },
];

const SESSIONS = {
  A: ['Leg press', 'Chest press', 'Seated cable row', 'Shoulder press', 'Cable curls'],
  B: ['Hack squat / leg press', 'Seated leg curl', 'Lat pulldown', 'Pec deck', 'Lateral raises', 'Ab crunch'],
};

const MILESTONES = [
  { day: 7, label: 'First week down', note: 'the habit exists' },
  { day: 21, label: 'Barber cycle one', note: 'lineup stays sharp' },
  { day: 30, label: 'First progress pic', note: 'the record begins' },
  { day: 60, label: 'Skin at baseline+', note: 'strength climbing' },
  { day: 90, label: 'The first "oh"', note: 'people start noticing' },
  { day: 180, label: 'Side-by-side territory', note: 'a different silhouette' },
];

const todayStr = (d = new Date()) =>
  d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
const daysBetween = (a, b) => Math.floor((new Date(b) - new Date(a)) / 864e5);
const mondayOf = (ds) => { const d = new Date(ds); d.setDate(d.getDate() - ((d.getDay()+6)%7)); return todayStr(d); };

const blank = () => ({
  startDate: todayStr(), checks: {}, barberLast: null, barberCount: 0,
  photoLast: null, photoCount: 0, gymTotal: 0, lifts: {}, kit: {}, side: {}, radiant: {},
  rewards: [
    { id: 'r1', name: 'Takeaway night', cost: 300, claimed: null },
    { id: 'r2', name: 'New overshirt', cost: 800, claimed: null },
    { id: 'r3', name: 'Quality watch', cost: 2000, claimed: null },
    { id: 'r4', name: 'Tattoo consult booked', cost: 4000, claimed: null },
  ],
  spent: 0, lastLevel: 0,
});

let state;
try { state = Object.assign(blank(), JSON.parse(localStorage.getItem(KEY)) || {}); }
catch { state = blank(); }
state.radiant = state.radiant || {};
state.side = state.side || {};
let tab = 'today';
let editLift = null;

const save = () => { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) { console.error(e); } };
const esc = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const today = () => todayStr();
const dayChecks = () => state.checks[today()] || {};
const journeyDay = () => daysBetween(state.startDate, today()) + 1;

function weekStats() {
  const weeks = {};
  for (const [day, checks] of Object.entries(state.checks)) {
    const wk = mondayOf(day);
    weeks[wk] = weeks[wk] || {};
    for (const [id, on] of Object.entries(checks)) {
      if (on) weeks[wk][id] = (weeks[wk][id] || 0) + 1;
    }
  }
  return weeks;
}
function weeklyBonusTotal() {
  let sum = 0;
  for (const counts of Object.values(weekStats())) {
    for (const w of WEEKLY) if ((counts[w.id] || 0) >= w.target) sum += w.bonus;
  }
  return sum;
}
function dayBonusTotal() {
  let sum = 0;
  for (const checks of Object.values(state.checks)) {
    if (DAILY.every(h => checks[h.id])) sum += DAY_BONUS;
  }
  return sum;
}
const LEGACY_SIDE_PTS = { hammam: 25, reference: 15, purge: 50, overshirt: 40, timekeeper: 30, tailor: 40 };
const earned = () =>
  Object.values(state.checks).reduce((s,d) => s + Object.entries(d).reduce((x,[id,on]) => x + (on ? PTS[id]||0 : 0), 0), 0)
  + state.barberCount * PTS_BARBER + state.photoCount * PTS_PHOTO
  + Object.values(state.kit).filter(Boolean).length * PTS_KIT
  + Object.entries(state.side).reduce((s,[id,on]) => s + (on ? LEGACY_SIDE_PTS[id]||0 : 0), 0)
  + RADIANT.reduce((s,q) => s + (state.radiant[q.id] || 0) * q.pts, 0)
  + weeklyBonusTotal() + dayBonusTotal();
const balance = () => earned() - state.spent;
const level = () => Math.floor(earned() / LVL_XP) + 1;

function weekCount(id) {
  const d = new Date(), dow = (d.getDay()+6)%7;
  let n = 0;
  for (let i = 0; i <= dow; i++) {
    const dd = new Date(); dd.setDate(d.getDate()-(dow-i));
    if ((state.checks[todayStr(dd)]||{})[id]) n++;
  }
  return n;
}
function streak() {
  let s = 0; const d = new Date();
  const t = state.checks[todayStr(d)]||{};
  if (!(t.skinAM && t.skinPM)) d.setDate(d.getDate()-1);
  while (true) {
    const c = state.checks[todayStr(d)]||{};
    if (c.skinAM && c.skinPM) { s++; d.setDate(d.getDate()-1); } else break;
  }
  return s;
}

function floatXP(txt, x, y) {
  const el = document.createElement('div');
  el.className = 'floatxp'; el.textContent = txt;
  el.style.left = (x-14) + 'px'; el.style.top = (y-26) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}
function banner(main, sub) {
  const el = document.createElement('div');
  el.className = 'banner';
  el.innerHTML = `<div class="bline"></div><div class="btext">${esc(main)}</div>` +
    (sub ? `<div class="bsub">${esc(sub)}</div>` : '') + `<div class="bline"></div>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}
function checkLevel() {
  const lv = level();
  if (lv > (state.lastLevel || 1) && state.lastLevel !== 0) banner('Level Up', 'level ' + lv);
  state.lastLevel = lv; save();
}

window.act = {
  tab(t) { tab = t; editLift = null; render(); },
  toggle(id, ev) {
    const cur = state.checks[today()]||{};
    const turningOn = !cur[id];
    state.checks[today()] = { ...cur, [id]: turningOn };
    save();
    if (turningOn) {
      if (ev) floatXP('+' + (PTS[id]||0), ev.clientX || innerWidth/2, ev.clientY || 200);
      const wq = WEEKLY.find(w => w.id === id);
      if (wq && weekCount(id) === wq.target) banner('Quest Complete', wq.name + ' · +' + wq.bonus);
      else if (DAILY.every(h => state.checks[today()][h.id])) banner('Day Conquered', 'all dailies · +' + DAY_BONUS);
    }
    checkLevel(); render();
  },
  claimRadiant(id, ev) {
    const q = RADIANT.find(r => r.id === id);
    if (!q) return;
    state.radiant[id] = (state.radiant[id] || 0) + 1;
    save();
    if (ev) floatXP('+' + q.pts, ev.clientX || innerWidth/2, ev.clientY || 200);
    banner('Quest Complete', q.name + ' ×' + state.radiant[id]);
    checkLevel(); render();
  },
  toggleKit(id, ev) {
    const on = !state.kit[id];
    state.kit[id] = on; save();
    if (on && ev) floatXP('+' + PTS_KIT, ev.clientX || innerWidth/2, ev.clientY || 200);
    checkLevel(); render();
  },
  completeSession(ev) {
    if (dayChecks().gym) return;
    state.checks[today()] = { ...dayChecks(), gym: true };
    state.gymTotal++; save();
    if (ev) floatXP('+' + PTS.gym, ev.clientX || innerWidth/2, ev.clientY || 300);
    const wq = WEEKLY.find(w => w.id === 'gym');
    if (weekCount('gym') === wq.target) banner('Quest Complete', wq.name + ' · +' + wq.bonus);
    else banner('Session Complete', 'session ' + (state.gymTotal % 2 === 0 ? 'B' : 'A') + ' next');
    checkLevel(); render();
  },
  logBarber(ev) {
    state.barberLast = today(); state.barberCount++; save();
    if (ev) floatXP('+' + PTS_BARBER, ev.clientX || innerWidth/2, ev.clientY || 300);
    checkLevel(); render();
  },
  logPhoto(ev) {
    state.photoLast = today(); state.photoCount++; save();
    if (ev) floatXP('+' + PTS_PHOTO, ev.clientX || innerWidth/2, ev.clientY || 300);
    checkLevel(); render();
  },
  editLift(ex) { editLift = ex; render(); },
  saveLift(ex) {
    const w = parseFloat(document.getElementById('lw').value);
    const r = parseInt(document.getElementById('lr').value);
    if (w || r) {
      const prev = state.lifts[ex];
      const improved = prev && (w > prev.weight || (w === prev.weight && r > prev.reps));
      state.lifts[ex] = {
        weight: w || (prev && prev.weight) || 0,
        reps: r || (prev && prev.reps) || 0,
        date: today(),
        prev: prev ? { weight: prev.weight, reps: prev.reps } : null,
      };
      save();
      if (improved) banner('Record Broken', ex);
    }
    editLift = null; render();
  },
  addReward() {
    const name = document.getElementById('rn').value.trim();
    const cost = parseInt(document.getElementById('rc').value);
    if (!name || !cost) return;
    state.rewards.push({ id: 'r'+Date.now(), name, cost, claimed: null });
    save(); render();
  },
  claim(id) {
    const rw = state.rewards.find(r => r.id === id);
    if (!rw || rw.claimed || balance() < rw.cost) return;
    state.spent += rw.cost; rw.claimed = today(); save();
    banner('Reward Claimed', rw.name);
    render();
  },
  removeReward(id) {
    state.rewards = state.rewards.filter(r => r.id !== id || r.claimed);
    save(); render();
  },
};

function render() {
  document.getElementById('dateline').textContent =
    new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' }) + ' · day ' + journeyDay();
  const e = earned();
  document.getElementById('streak').textContent = streak();
  document.getElementById('lvline').textContent = 'Lvl ' + level();
  document.getElementById('ptsline').innerHTML = '<b>' + balance() + '</b> pts';
  document.getElementById('xpfill').style.width = (e % LVL_XP)/LVL_XP*100 + '%';
  document.getElementById('tabs').innerHTML = ['today','gym','rewards','journey'].map(t =>
    `<button class="tab ${tab===t?'on':''}" onclick="act.tab('${t}')">${t}</button>`).join('');
  const v = document.getElementById('view');
  if (tab === 'today') v.innerHTML = renderToday();
  else if (tab === 'gym') v.innerHTML = renderGym();
  else if (tab === 'rewards') v.innerHTML = renderRewards();
  else v.innerHTML = renderJourney();
}

function renderToday() {
  const dc = dayChecks();
  let strip = '';
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const key = todayStr(d);
    const done = Object.values(state.checks[key]||{}).filter(Boolean).length;
    const isToday = key === today();
    const bg = done >= 5 ? '#E8E2D6' : done > 0 ? '#6E675C' : 'transparent';
    strip += `<div class="stripday">
      <div class="stripdot" style="background:${bg};border-color:${isToday?'#8C2F2F':'#3A362F'}"></div>
      <div class="stripletter" style="color:${isToday?'#8C2F2F':'#6E675C'}">${'MTWTFSS'[(d.getDay()+6)%7]}</div>
    </div>`;
  }

  const dailies = DAILY.map(h => {
    const on = !!dc[h.id];
    const wk = h.weekly ? weekCount(h.id) : null;
    return `<button class="habit" onclick="act.toggle('${h.id}', event)">
      <div class="checkbox ${on?'on':''}">${on?'✕':''}</div>
      <div style="flex:1"><div class="hlabel ${on?'done':''}">${h.name}</div><div class="hsub">${h.sub}</div></div>
      ${wk!==null?`<div class="badge" style="color:${wk>=h.weekly?'#E8E2D6':'#8C2F2F'}">${wk}/${h.weekly}</div>`:''}
      <div class="xp">+${PTS[h.id]}</div>
    </button>`;
  }).join('');

  const gymOn = !!dc.gym;
  const gymRow = `<div class="habit" style="cursor:default">
    <div class="checkbox ${gymOn?'on':''}">${gymOn?'✕':''}</div>
    <div style="flex:1"><div class="hlabel ${gymOn?'done':''}">Gym</div><div class="hsub">log it in the gym tab</div></div>
    <div class="xp">+${PTS.gym}</div>
  </div>`;

  const wstats = weekStats()[mondayOf(today())] || {};
  const weeklies = WEEKLY.map(w => {
    const n = Math.min(wstats[w.id] || 0, w.target);
    const hit = n >= w.target;
    return `<div class="wquest">
      <div style="display:flex;align-items:baseline;gap:8px">
        <div class="hlabel" style="flex:1;font-size:14px;color:${hit?'#8C2F2F':'#E8E2D6'}">${hit?'✕ ':''}${w.name}</div>
        <div class="hsub">${n}/${w.target}</div>
        <div class="xp">+${w.bonus}</div>
      </div>
      <div class="hsub">${w.sub}</div>
      <div class="wbar"><div class="wfill" style="width:${n/w.target*100}%"></div></div>
    </div>`;
  }).join('');

  const radiants = RADIANT.map(q => {
    const n = state.radiant[q.id] || 0;
    return `<div class="liftrow">
      <div style="flex:1"><div class="hlabel" style="font-size:14px">${q.name}</div><div class="hsub">${q.sub}</div></div>
      ${n > 0 ? `<div class="radcount">×${n}</div>` : ''}
      <div class="xp">+${q.pts}</div>
      <button class="smallbtn hot" onclick="act.claimRadiant('${q.id}', event)">done</button>
    </div>`;
  }).join('');

  return `<div class="fadein">
    <div class="strip">${strip}</div>
    <div class="section">Daily · all seven = +${DAY_BONUS}</div>
    ${dailies}${gymRow}
    <div class="section">Weekly</div>
    ${weeklies}
    <div class="section">Radiant · repeatable · honor system</div>
    ${radiants}
  </div>`;
}

function renderGym() {
  const next = state.gymTotal % 2 === 0 ? 'A' : 'B';
  const done = !!dayChecks().gym;
  const rows = SESSIONS[next].map(ex => {
    const lift = state.lifts[ex];
    const improved = lift && lift.prev && (lift.weight > lift.prev.weight || (lift.weight === lift.prev.weight && lift.reps > lift.prev.reps));
    const last = lift ? `last: ${lift.weight}kg × ${lift.reps}` : 'no log yet';
    const controls = editLift === ex
      ? `<input id="lw" inputmode="decimal" placeholder="kg" value="${lift?lift.weight:''}">
         <input id="lr" inputmode="numeric" placeholder="reps" value="${lift?lift.reps:''}">
         <button class="smallbtn hot" onclick="act.saveLift('${esc(ex)}')">✕</button>`
      : `<button class="smallbtn" onclick="act.editLift('${esc(ex)}')">log</button>`;
    return `<div class="liftrow">
      <div style="flex:1"><div style="font-size:14px;font-weight:700">${ex}</div>
      <div class="hsub">${last}${improved?' <span style="color:#8C2F2F">▲</span>':''}</div></div>
      <div style="display:flex;gap:6px;align-items:center">${controls}</div>
    </div>`;
  }).join('');
  return `<div class="fadein">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin:14px 2px 4px">
      <span class="section" style="margin:0">Session</span>
      <span style="font-family:'Pirata One',serif;font-size:36px">${next}</span></div>
    <div class="hsub" style="margin:0 2px 12px">3 sets · 8–12 reps · last 2 hard · beat last numbers</div>
    ${rows}
    <button class="bigbtn" ${done?'disabled':''} onclick="act.completeSession(event)">
      ${done ? 'session logged ✕' : 'complete session ' + next + ' · +' + PTS.gym}</button>
    <div class="hsub" style="text-align:center;margin-top:8px">${state.gymTotal} total sessions</div>
  </div>`;
}

function renderRewards() {
  const bal = balance();
  const open = state.rewards.filter(r => !r.claimed).map(r => `
    <div class="liftrow">
      <div style="flex:1"><div class="hlabel" style="font-size:14px">${esc(r.name)}</div>
      <div class="hsub">${bal >= r.cost ? 'unlocked — claim it' : (r.cost - bal) + ' pts to go'}</div></div>
      <div class="badge" style="color:${bal>=r.cost?'#E8E2D6':'#6E675C'}">${r.cost}</div>
      <button class="smallbtn ${bal>=r.cost?'hot':''}" ${bal<r.cost?'disabled':''} onclick="act.claim('${r.id}')">claim</button>
      <button class="smallbtn" style="border:none;padding:6px 2px" onclick="act.removeReward('${r.id}')">✕</button>
    </div>`).join('');
  const claimed = state.rewards.filter(r => r.claimed);
  const claimedHtml = claimed.length
    ? `<div class="section">Claimed</div>` +
      claimed.map(r => `<div class="hsub" style="padding:4px 2px">✕ ${esc(r.name)} · ${r.cost} pts · ${r.claimed}</div>`).join('')
    : '';
  return `<div class="fadein">
    <div class="hsub" style="margin:14px 2px 10px">Every habit pays points. Spend them on rewards you name yourself — set the prize, set the price, claim when banked.</div>
    ${open}
    <div style="display:flex;gap:6px;margin:14px 0 4px">
      <input id="rn" placeholder="new reward" style="flex:1;width:auto">
      <input id="rc" inputmode="numeric" placeholder="pts">
      <button class="smallbtn" onclick="act.addReward()">add</button>
    </div>
    ${claimedHtml}
  </div>`;
}

function renderJourney() {
  const bd = state.barberLast ? 21 - daysBetween(state.barberLast, today()) : null;
  const pd = state.photoLast ? 30 - daysBetween(state.photoLast, today()) : null;
  const counter = (v) => v === null ? '—' : v > 0 ? v + 'd' : 'DUE';
  const col = (v) => v !== null && v <= 0 ? '#8C2F2F' : '#E8E2D6';
  const kit = KIT.map(k => {
    const on = !!state.kit[k.id];
    return `<button class="habit" style="padding:9px 2px" onclick="act.toggleKit('${k.id}', event)">
      <div class="checkbox ${on?'on':''}" style="width:18px;height:18px;font-size:12px">${on?'✕':''}</div>
      <div style="flex:1;font-size:13px;color:${on?'#6E675C':'#E8E2D6'};${on?'text-decoration:line-through':''}">${k.label}</div>
      <div class="xp">+${PTS_KIT}</div>
    </button>`;
  }).join('');
  const road = MILESTONES.map(m => {
    const hit = journeyDay() >= m.day;
    return `<div style="display:flex;gap:12px;align-items:flex-start;padding:8px 2px;border-bottom:1px solid #1E1B16">
      <div style="font-family:'Pirata One',serif;font-size:20px;width:50px;color:${hit?'#8C2F2F':'#3A362F'};flex-shrink:0">${m.day}d</div>
      <div><div style="font-size:14px;font-weight:700;color:${hit?'#E8E2D6':'#6E675C'}">${hit?'✕ ':''}${m.label}</div>
      <div class="hsub">${m.note}</div></div>
    </div>`;
  }).join('');
  return `<div class="fadein">
    <div style="display:flex;gap:10px;margin-top:14px">
      <div class="card"><div class="cardtitle">Barber</div>
        <div class="counternum" style="color:${col(bd)}">${counter(bd)}</div>
        <button class="smallbtn" onclick="act.logBarber(event)">fresh cut · +${PTS_BARBER}</button></div>
      <div class="card"><div class="cardtitle">Progress pic</div>
        <div class="counternum" style="color:${col(pd)}">${counter(pd)}</div>
        <button class="smallbtn" onclick="act.logPhoto(event)">logged · +${PTS_PHOTO}</button></div>
    </div>
    <div class="section">The Kit</div>${kit}
    <div class="section">The Road</div>${road}
  </div>`;
}

state.lastLevel = state.lastLevel || level();
save();
render();
</script>
</body>
</html>
